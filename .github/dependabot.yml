version: 2
updates:
  # Python runtime deps (requirements.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

  # Keep GitHub Actions pinned versions current (prevents the CodeQL v2
  # deprecation breakage from recurring).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
